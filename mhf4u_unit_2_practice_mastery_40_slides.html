<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHF4U Unit 2 - Practice Mastery</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-main: #020617;
            --bg-panel: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --cyan: #22d3ee;
            --purple: #c084fc;
            --green: #4ade80;
            --yellow: #fbbf24;
            --red: #f87171;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        h1, h2, h3, h4 { font-family: 'Poppins', sans-serif; }
        
        #presentation-container {
            width: 1280px; height: 720px;
            background: radial-gradient(120% 120% at 50% -10%, #1e293b 0%, #020617 100%);
            border-radius: 16px; position: relative; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1);
        }

        .slide { position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 70px); padding: 40px 60px; display: none; flex-direction: column; opacity: 0; transition: opacity 0.3s ease; }
        .slide.active { display: flex; opacity: 1; z-index: 10; }
        
        /* Navigation Bar */
        .nav-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 70px; background: rgba(15, 23, 42, 0.95); border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; z-index: 20; backdrop-filter: blur(10px); }
        .nav-btn { background: rgba(34, 211, 238, 0.1); border: 1px solid var(--cyan); color: var(--cyan); padding: 10px 25px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; font-family: 'Poppins'; }
        .nav-btn:hover { background: var(--cyan); color: #020617; }
        .nav-btn:disabled { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: #64748b; cursor: not-allowed; }
        .progress-text { color: var(--text-muted); font-family: 'Poppins', sans-serif; font-weight: 600; letter-spacing: 2px; font-size: 16px; }

        /* Typography & Layouts */
        .slide-title { font-size: 36px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 12px; margin-bottom: 20px; font-weight: 700; display: flex; justify-content: space-between; align-items: flex-end; }
        .level-badge { font-size: 16px; padding: 6px 16px; border-radius: 20px; background: var(--card-bg); border: 1px solid currentColor; }
        
        .split-layout { display: grid; grid-template-columns: 400px 1fr; gap: 30px; height: 100%; flex-grow: 1; }
        .question-panel { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 25px; display: flex; flex-direction: column; }
        .math-block { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 8px; text-align: center; font-size: 26px; font-family: 'Times New Roman', serif; font-style: italic; margin: 15px 0; border-left: 4px solid var(--purple); }
        
        /* Tabs */
        .tab-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { padding: 10px 15px; background: var(--bg-panel); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); border-radius: 8px; cursor: pointer; font-family: 'Poppins'; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .tab-btn.active { background: var(--cyan); color: #000; border-color: var(--cyan); }
        .tab-content { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 25px; flex-grow: 1; display: none; font-size: 20px; line-height: 1.6; overflow-y: auto; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .sol-step { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .sol-step:last-child { border-bottom: none; }
        
        /* Helpers */
        .text-cyan { color: var(--cyan); } .text-purple { color: var(--purple); }
        .text-green { color: var(--green); } .text-yellow { color: var(--yellow); }
        .text-red { color: var(--red); }
    </style>
</head>
<body>

<div id="presentation-container">
    <!-- Slides will be injected here dynamically via JS -->
    
    <!-- Controls -->
    <div class="nav-bar">
        <button class="nav-btn" id="prevBtn" onclick="changeSlide(-1)" disabled><i class="fas fa-chevron-left"></i> Prev</button>
        <span class="progress-text" id="slideCounter">1 / 40</span>
        <button class="nav-btn" id="nextBtn" onclick="changeSlide(1)">Next <i class="fas fa-chevron-right"></i></button>
    </div>
</div>

    let currentSlide = 0;
    const totalSlides = slideData.length;
    const container = document.getElementById('presentation-container');

    function createSlideHTML(data, index) {
        if (data.type === "title") {
            return `
            <div class="slide ${index === 0 ? 'active' : ''}" id="slide-${index}" style="justify-content: center; align-items: center; text-align: center;">
                <i class="fas fa-graduation-cap text-cyan text-6xl mb-6"></i>
                <h1 class="text-6xl font-bold mb-4 text-white">${data.title}</h1>
                <h2 class="text-3xl text-cyan mb-8">${data.subtitle}</h2>
                <p class="text-xl text-slate-400">${data.desc}</p>
            </div>`;
        }
        
        if (data.type === "outro") {
            return `
            <div class="slide ${index === 0 ? 'active' : ''}" id="slide-${index}" style="justify-content: center; align-items: center; text-align: center;">
                <i class="fas fa-trophy text-yellow text-7xl mb-6"></i>
                <h1 class="text-5xl font-bold mb-4 text-white">${data.title}</h1>
                <h2 class="text-2xl text-green mb-8">${data.subtitle}</h2>
                <p class="text-xl text-slate-400">${data.desc}</p>
            </div>`;
        }

        // Standard Question Slide
        return `
        <div class="slide ${index === 0 ? 'active' : ''}" id="slide-${index}">
            <h2 class="slide-title" style="color: ${data.color}; border-color: ${data.color};">
                ${data.title}
                <span class="level-badge" style="color: ${data.color};">${data.level}</span>
            </h2>
            
            <div class="split-layout">
                <div class="question-panel">
                    <h3 class="text-2xl font-bold text-white mb-6">Question:</h3>
                    <p class="text-xl leading-relaxed text-slate-200">${data.q}</p>
                </div>
                
                <div class="flex flex-col">
                    <div class="tab-bar">
                        <button class="tab-btn active" onclick="switchTab(this, 'think-${index}')"><i class="fas fa-brain"></i> Think</button>
                        <button class="tab-btn" onclick="switchTab(this, 'hint-${index}')"><i class="fas fa-lightbulb"></i> Hint</button>
                        <button class="tab-btn" onclick="switchTab(this, 'sol-${index}')"><i class="fas fa-check-circle"></i> Solution</button>
                    </div>
                    
                    <div id="think-${index}" class="tab-content active" style="border-left: 4px solid var(--yellow); background: rgba(251, 191, 36, 0.05);">
                        <strong class="text-yellow">Logic Check:</strong><br><br>${data.think}
                    </div>
                    
                    <div id="hint-${index}" class="tab-content" style="border-left: 4px solid var(--purple); background: rgba(192, 132, 252, 0.05);">
                        <strong class="text-purple">Hint:</strong><br><br>${data.hint}
                    </div>
                    
                    <div id="sol-${index}" class="tab-content">
                        ${data.sol}
                    </div>
                </div>
            </div>
        </div>`;
    }

    function init() {
        let allSlidesHTML = "";
        slideData.forEach((slide, i) => {
            allSlidesHTML += createSlideHTML(slide, i);
        });
        
        // Insert before nav-bar
        const navBar = document.querySelector('.nav-bar');
        navBar.insertAdjacentHTML('beforebegin', allSlidesHTML);
        updateNav();
    }

    function changeSlide(direction) {
        document.getElementById(`slide-${currentSlide}`).classList.remove('active');
        currentSlide += direction;
        document.getElementById(`slide-${currentSlide}`).classList.add('active');
        updateNav();
    }

    function updateNav() {
        document.getElementById('slideCounter').innerText = `${currentSlide + 1} / ${totalSlides}`;
        document.getElementById('prevBtn').disabled = currentSlide === 0;
        document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
    }

    function switchTab(btn, targetId) {
        const panel = btn.closest('.flex-col');
        panel.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        panel.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        btn.classList.add('active');
        document.getElementById(targetId).classList.add('active');
    }

    // Run initialization
    init();
</script>

</body>
</html>
